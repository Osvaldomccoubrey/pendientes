<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendientes</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

.topbar {
  background: #1e2a44;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.count-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 18px;
}

.lista {
  padding: 15px;
}

.item {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>Pendientes</div>

  <div class="count-badge">
    <span id="countBadge">0</span>

    <span id="btnLeerPendientes" style="
      display:flex;
      align-items:center;
      justify-content:center;
      width:28px;
      height:28px;
      border-radius:50%;
      background:rgba(255,255,255,0.15);
      cursor:pointer;
    ">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="white">
        <path d="M3 9v6h4l5 5V4L7 9H3z"></path>
        <path d="M14.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.74 2.5-2.26 2.5-4.02z"></path>
        <path d="M16.5 7.5a6 6 0 0 1 0 9" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"></path>
      </svg>
    </span>
  </div>
</div>

<div class="lista" id="lista"></div>

<script>

// ====== DATOS ======
let pendientes = JSON.parse(localStorage.getItem('pendientes_v1') || '[]');
let filtro = 'todos';

// ====== RENDER ======
function renderLista() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const visibles = obtenerPendientesVisibles();

  visibles.forEach(p => {
    lista.innerHTML += `
      <div class="item">
        ${p.texto}
      </div>
    `;
  });
}

// ====== HEADER ======
function updateHeader() {
  document.getElementById("countBadge").innerText = obtenerPendientesVisibles().length;
}

// ====== FILTRO ======
function obtenerPendientesVisibles() {
  return filtro === 'todos'
    ? pendientes
    : pendientes.filter(p => p.prioridad === filtro);
}

// ====== VOZ ======
document.getElementById("btnLeerPendientes").addEventListener("click", leerPendientes);

function leerPendientes() {
  if (!('speechSynthesis' in window)) {
    alert('Este dispositivo no soporta voz.');
    return;
  }

  const visibles = obtenerPendientesVisibles();

  speechSynthesis.cancel();

  let texto = '';

  if (!visibles.length) {
    texto = 'No tenés pendientes.';
  } else {
    texto = `Tenés ${visibles.length} tarea${visibles.length > 1 ? 's' : ''} pendiente${visibles.length > 1 ? 's' : ''}. `;

    visibles.forEach(p => {
      if (!p.texto) return;

      if (p.prioridad === 'urgente') {
        texto += `Tarea importante: ${p.texto}. `;
      } else {
        texto += `Tarea: ${p.texto}. `;
      }
    });
  }

  texto = texto.replace(/\s+/g, ' ').trim();

  hablarTexto(texto);
}

function hablarTexto(texto) {
  speechSynthesis.cancel();

  const msg = new SpeechSynthesisUtterance();
  msg.text = texto;

  msg.lang = 'es-AR';
  msg.rate = 1;
  msg.pitch = 1;

  const voces = speechSynthesis.getVoices();
  const voz = voces.find(v => v.lang && v.lang.includes('es'));
  if (voz) msg.voice = voz;

  speechSynthesis.speak(msg);
}

// ====== INIT ======
renderLista();
updateHeader();

</script>

</body>
</html>
